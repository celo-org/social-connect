name: Rust Signer CI

on:
  push:
    branches: [main, "palango/*"]
    paths: ["rust/**", "Cargo.toml", "Cargo.lock", "justfile"]

concurrency:
  group: rust-signer-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Build + Format + Clippy + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt, clippy

      - uses: extractions/setup-just@v2

      - uses: Swatinem/rust-cache@v2

      - run: just build
      - run: just fmt-check
      - run: just clippy
      - run: just test
